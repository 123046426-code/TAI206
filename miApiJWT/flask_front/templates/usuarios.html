<!DOCTYPE html>
<html>
<head>
    <title>Usuarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h3>Agregar Usuario</h3>

    <form method="post" action="/agregar">
        <input class="form-control mb-2" name="id" placeholder="ID">
        <input class="form-control mb-2" name="nombre" placeholder="Nombre">
        <input class="form-control mb-2" name="edad" placeholder="Edad">
        <button class="btn btn-primary">Guardar</button>
    </form>

    <h2>Lista de Usuarios</h2>

    <table class="table table-striped">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Acciones</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.edad }}</td>
            <td>
                <a class="btn btn-warning btn-sm" href="/editar/{{u.id}}">Editar</a>
                <a class="btn btn-danger btn-sm" href="/eliminar/{{u.id}}">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
